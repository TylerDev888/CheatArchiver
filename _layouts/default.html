<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title | default: "Cheat Code Archive" }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>

  <!-- Outer CRT wrapper -->
  <div class="crt-outer">

    <!-- CRT screen content area - positioned over background image -->
    <div class="crt-frame">

      <!-- Scanline overlay -->
      <div class="scanlines" aria-hidden="true"></div>

      <!-- Main scrollable content area -->
      <div class="screen-content">
        {{ content }}
      </div>

    </div><!-- /crt-frame -->

  </div><!-- /crt-outer -->

</body>
</html>
